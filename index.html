<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />

    <script src="./js/clock.js" onload="GetDateTime()" defer></script>
    <script src="./js/Advice.js" defer></script>
    <script src="./js/weather.js" defer></script>
    <script src="./js/Title.js" defer></script>
    <script src="./js/ChangeBackground.js" defer></script>
    <script src="./js/bookmarks.js" defer></script>

    <title>SimonFCO Dashboard</title>
  </head>
  <body>
    <header>
      <div class="DateTime">
        <time id="Clock"></time>
        <time id="Date"></time>
      </div>
    </header>

    <div class="Title" id="Title" contenteditable="true">
      <h1>SimonFCO Dashboard</h1>
    </div>

    <div id="bookmark-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Lägg till en länk</h3>

        <p>Titel:</p>
        <input type="text" id="bookmark-text-input" placeholder="e.g. Google" />

        <p>Link (URL):</p>
        <input
          type="text"
          id="bookmark-link-input"
          placeholder="e.g. https://google.com"
        />

        <div class="modal-buttons">
          <button id="save-btn">Save</button>
          <button id="close-btn">Close</button>
        </div>
      </div>
    </div>

    <section class="dashboard-container">
      <div class="DashboardObject" id="BookMarks">
        <h2>Snabblänkar</h2>
        <div id="bookmark-container" class="bookmark-list"></div>
        <button id="MakeBookmark-button" class="bottom-btn">
          Lägg Till Ny Länk
        </button>
      </div>

      <div class="DashboardObject" id="WeatherContainer">
        <h2>Dagens Väder</h2>
        <div id="weather-container">Loading weather...</div>
      </div>

      <div class="DashboardObject" id="AdviceContainer">
        <h2>Tips :)</h2>
        <p class="Advice" id="Advice">Loading Advice...</p>
      </div>

      <div class="DashboardObject" id="WriteField">
        <h2>Anteckningar</h2>
        <div class="NoteInfo">
          <textarea
            class="content"
            id="notes"
            placeholder="WRITE WRITE WRITE"
          ></textarea>
        </div>
      </div>
      <button id="WallpaperChanger-button">🔄️ CHANGE WALLPAPER</button>
    </section>
  </body>
</html>
